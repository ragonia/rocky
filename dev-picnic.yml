version: "3.8"

services:
  picnictime-ghost:
    image: ghost:latest

    environment:
      url: https://picnictime.facil.co.kr

      database__client: mysql
      database__connection__host: db_mysql
      database__connection__port: 3306
      database__connection__user: ragoni
      database__connection__database: picnictime

    secrets:
      - mysql_password

    # secret 파일을 읽어 password 문자열로 주입
    command: >
      sh -lc '
        export database__connection__password="$$(cat /run/secrets/mysql_password)";
        cp /custom/config.production.json /var/lib/ghost/config.production.json;
        docker-entrypoint.sh node current/index.js
      '

    volumes:
      - /docker/picnictime/content:/var/lib/ghost/content
      - /docker/picnictime/config.production.json:/custom/config.production.json

    networks:
      - proxy
      - dbnet

    deploy:
      replicas: 1
      placement:
        constraints:
          #- node.hostname == pubuntu
          - node.role == worker

      labels:
        - "caddy=picnictime.facil.co.kr"
        - "caddy.reverse_proxy={{upstreams 2368}}"
        - "caddy.tls.dns=cloudflare"
        - "caddy.tls.ca=https://acme-v02.api.letsencrypt.org/directory"

  wordpicnic:
    image: wordpress:latest
    environment:
      WORDPRESS_DB_HOST: db_mysql:3306
      WORDPRESS_DB_USER: ragoni
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/mysql_password
      WORDPRESS_DB_NAME: wordpicnic
    secrets:
      - mysql_password
    networks:
      - proxy
      - dbnet
    deploy:
      placement:
        constraints:
          - node.role == worker
          # - node.hostname == 
      labels:
        - "traefik.enable=true"
        - "caddy=wordpicnic.facil.co.kr"
        - "caddy.reverse_proxy={{upstreams 80}}"
        - "caddy.tls.dns=cloudflare"
        - "caddy.tls.ca=https://acme-v02.api.letsencrypt.org/directory"

    volumes:
      - /docker/wordpicnic:/var/www/html
      - /docker/word/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      
networks:
  proxy:
    external: true
  dbnet:
    external: true

secrets:
  mysql_password:
    external: true
