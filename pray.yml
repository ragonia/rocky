version: "3.8"

services:
  pray-viewer:
    image: nginx:alpine
    deploy:
      replicas: 1  # 매니저 노드에 두 개의 레플리카 배포
      placement:
        constraints:
          #- node.role == manager  # 매니저 노드에 배포
          - node.hostname == blue

    volumes:
      - /docker/pray/download:/usr/share/nginx/html:ro
    networks:
      - proxy

networks:
  proxy:
    external: true
