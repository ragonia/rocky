version: "3.8"

services:
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
    secrets:
      - mysql_root_password
    networks:
      - proxy
      - dbnet
    deploy:
      placement:
        constraints:
          - node.role == worker
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=proxy"
        - "traefik.http.routers.phpmyadmin.rule=Host(`mysql.facil.co.kr`)"
        - "traefik.http.routers.phpmyadmin.entrypoints=websecure"
        - "traefik.http.routers.phpmyadmin.tls.certResolver=cloudflare"
        - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
        - "traefik.http.routers.phpmyadmin-http.rule=Host(`mysql.facil.co.kr`)"
        - "traefik.http.routers.phpmyadmin-http.entrypoints=web"
        - "traefik.http.routers.phpmyadmin-http.middlewares=redirect-to-https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

volumes:
  blog_wordpress_data:

networks:
  proxy:
    external: true
  dbnet:
    external: true

secrets:
  mysql_root_password:
    external: true
